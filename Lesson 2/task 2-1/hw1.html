<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>List</title>
    <link rel="stylesheet" href="style.css">


</head>
<body>

<div class="wrapper">

  <div class="start">
    <div id="demo">
  <h2>What do I have in my fridge?</h2>
    </div>
  </div>

  <div class="grid">

      <div class="item pepper">
        <p>Pepper</p>
      </div>
      <div class="item apple">
        <p>Apple</p>
      </div>
      <div class="item cheese">
        <p>Cheese</p>
      </div>
      <div class="item corn">
          <img src="https://www.clker.com/cliparts/e/d/c/7/12456951341992058408johnny_automatic_corn.svg.hi.png" alt="corn">
        <p>Corn</p>
      </div>
      <div class="item mushroom">
        <p>Mushroom</p>
      </div>
      <div class="item garlic">
        <p>Garlic</p>
      </div>
      <div class="item beef">
        <p>Beef</p>
      </div>
      <div class="item fish">
        <p>Fish</p>
     </div>
      <div class="item eggs">
        <p>Eggs</p>
      </div>
      <div class="item coriander">
        <p>Coriander</p>
      </div>
  </div>

      <div class="end">
        <hr>
          <p><b>...that's all...</b></p>
      </div>

</div>




</body>
</html>

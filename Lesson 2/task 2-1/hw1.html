<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>List</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="wrapper">

  <div class="start">
    <div id="demo">
      <h2>What do I have in my fridge?</h2>
    </div>
  </div>

  <div class="grid">

      <div class="item pepper">
          <img src="https://www.clipartmax.com/png/full/29-295004_sweet-peeper-yellow-bell-pepper-clipart.png" alt="pepper">
        <p>Pepper</p>
      </div>

      <div class="item apple">
          <img src="https://png.pngtree.com/png-vector/20231017/ourmid/pngtree-fresh-apple-fruit-red-png-image_10203073.png" alt="apple">
        <p>Apple</p>
      </div>

      <div class="item cheese">
          <img src="https://img.pikbest.com/png-images/20250222/bold-cartoon-cheese-wedge-illustration-with-circular-holes-in-vector-style_11546551.png!sw800" alt="cheese">
        <p>Cheese</p>
      </div>

      <div class="item corn">
          <img src="https://www.clker.com/cliparts/e/d/c/7/12456951341992058408johnny_automatic_corn.svg.hi.png" alt="corn">
        <p>Corn</p>
      </div>

      <div class="item mushroom">
          <img src="https://png.pngtree.com/png-vector/20240629/ourmid/pngtree-mashroom-img-png-image_12920047.png" alt="mushroom">
        <p>Mushroom</p>
      </div>

      <div class="item garlic">
          <img src="https://static.vecteezy.com/system/resources/thumbnails/047/433/957/small/fresh-garlic-rhizome-and-sliced-with-leaves-isolated-png.png" alt ="garlic">
        <p>Garlic</p>
      </div>

      <div class="item beef">
          <img src="https://icons.veryicon.com/png/o/food--drinks/fresh-1/meat-4.png" alt ="beef">
        <p>Beef</p>
      </div>

      <div class="item fish">
          <img src="https://png.pngtree.com/png-vector/20240112/ourmid/pngtree-simple-fish-image-png-image_11436068.png" alt="fish">
        <p>Fish</p>
     </div>

      <div class="item eggs">
          <img src="https://png.pngtree.com/png-vector/20250606/ourmid/pngtree-chicken-eggs-isolated-on-transparent-background-png-image_16464753.png" alt="eggs">
        <p>Eggs</p>
      </div>

      <div class="item coriander">
          <img src="https://img.pikbest.com/png-images/fresh-coriander-coriander-leaves-png-element_2494787.png!sw800" alt="coriander">
        <p>Coriander</p>
      </div>

  </div>

      <div class="end">
        <hr>
          <p><b>...that's all...</b></p>
      </div>

</div>

</body>
</html>

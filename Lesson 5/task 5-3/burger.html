<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>BURGER</title>
  <link rel="stylesheet" href="style3.css">
</head>
<body>
<div class="w-1340">
    <header>
        <ul>
            <li class="about"><a href="#">About</a></li>
            <li><a href="#">Menu</a></li>
            <li class="order__button"><a href="#">ORDER ONLINE</a></li>
        </ul>
    </header>

    <main>

        <div class="burger__title">
            <h1>NEW YORK’S FAVORITE ORGANIC HAMBURGER JOINT</h1>
        </div>
        <div class="burger__img">
            <img src="images/burgers.png" alt="big burger photo">
        </div>

        <article class="burger__info">

            <section class="left">
                <div class="burger__textleft">
                    <h2>THE BURGER ABOVE ALL BURGERS</h2>
                </div>
            </section>

            <section class="right">
                <div class="burger__textright">
                    <p class="lorem">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Itaque, officia.</p>
                    <p class="about__us"><a>ABOUT US</a></p>
                </div>
            </section>

        </article>

        <article class="burger__photos">

            <div class="burger__img1">
                <img src="images/burger1.jpg" alt="frees photo">
            </div>

            <div class="burger__img2">
                <img src="images/burger2.jpg" alt="long burger photo">
            </div>

            <div class="burger__img3">
                <img src="images/burger3.jpg" alt="long photo">
            </div>

        </article>

    </main>

    <footer>
        <div class="footer__title">
            <h2 class="h2_2">
                ORDER ONLINE OR COME VISIT US TODAY
            </h2>
        </div>

        <div class="button">
            <button class="btn">ORDER ONLINE</button>
        </div>
    </footer>

</div>
</body>
</html>

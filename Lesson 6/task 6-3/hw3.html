<!doctype html>
<html lang="en">
<head>

    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Instagram</title>
    <link rel="stylesheet" href="style3.css">

</head>
<body>
<form class="instagram">
    <div class="instagram-box">

        <h1>Instagram</h1>
        <div class="group">
            <label class="field">
                <input type="text" placeholder="Номер телефону, ім'я користувача або email">
            </label>

            <label class="field">
                <input type="password" placeholder="Пароль">
            </label>
        </div>

        <div class="forget">
            <div class="buttom">
                <button class="enter">Увійти</button>
            </div>

            <p><b>АБО</b></p>
            <div class="facebook">
            <img src="icon/facebook.png" alt="facebook"> <a href="#"><b>Увійти через Facebook</b></a>
            </div>
            <a href="#">Забули пароль?</a>
        </div>
    </div>
    <footer>
        <p class="zapis">Не маєте облікового запису?</p> <a href="#"><b>Зареєструйтеся</b></a>
    </footer>
</form>
</body>
</html>
